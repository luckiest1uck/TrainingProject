openapi: "3.0.3"

info:
  title: "Training Project Support Chat API"
  description: "Authenticated customer support chat REST API for status, conversation bootstrap, history, and message submission."
  version: "1.0.0"
  contact:
    name: "Training Project Support"
    email: "training@example.test"
    url: "https://example.test/training-project"

servers:
  - url: "http://localhost:8083"
    description: "Local development server"
  - url: "https://example.test/training-project/backend"
    description: "Production server"

security:
  - bearerAuth: []

tags:
  - name: "Support Chat"
    description: "Operations for authenticated customer support chat."

paths:
  /api/v1/support-chat/status:
    get:
      tags:
        - "Support Chat"
      summary: "Get support chat availability for the current user"
      operationId: "getSupportChatStatus"
      responses:
        "200":
          description: "Support chat status."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportChatStatusDto"
        "401":
          description: "Unauthorized access."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/support-chat/conversation:
    get:
      tags:
        - "Support Chat"
      summary: "Get or create the current user's permanent support conversation"
      operationId: "getCurrentSupportChatConversation"
      responses:
        "200":
          description: "Current support conversation."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportChatConversationDto"
        "401":
          description: "Unauthorized access."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: "Email verification is required."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Support chat is disabled or unavailable."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/support-chat/websocket-ticket:
    post:
      tags:
        - "Support Chat"
      summary: "Create a short-lived support chat WebSocket ticket"
      operationId: "createSupportChatWebSocketTicket"
      responses:
        "200":
          description: "Short-lived support chat WebSocket ticket."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportChatWebSocketTicketDto"
        "401":
          description: "Unauthorized access."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: "Email verification is required."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Support chat is disabled or unavailable."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/support-chat/conversations/{conversationId}/messages:
    get:
      tags:
        - "Support Chat"
      summary: "Get visible support chat message history"
      operationId: "getSupportChatMessages"
      parameters:
        - name: "conversationId"
          in: "path"
          required: true
          schema:
            type: "string"
            format: "uuid"
        - name: "page"
          in: "query"
          required: false
          schema:
            type: "integer"
            default: 0
            minimum: 0
        - name: "size"
          in: "query"
          required: false
          schema:
            type: "integer"
            default: 20
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: "Support chat message history."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportChatMessagePageDto"
        "401":
          description: "Unauthorized access."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: "Email verification is required."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Conversation not found or support chat unavailable."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags:
        - "Support Chat"
      summary: "Send a customer support chat message"
      operationId: "sendSupportChatMessage"
      parameters:
        - name: "conversationId"
          in: "path"
          required: true
          schema:
            type: "string"
            format: "uuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupportChatMessageRequest"
      responses:
        "200":
          description: "Message accepted."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportChatMessageDto"
        "400":
          description: "Invalid message request."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized access."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: "Email verification is required."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Conversation not found or support chat unavailable."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: "Repeated message rejected."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: "Too many support chat messages."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/support-chat/telegram/webhook:
    post:
      tags:
        - "Support Chat Telegram Webhook"
      summary: "Receive Telegram owner reply webhook updates"
      operationId: "handleSupportChatTelegramWebhook"
      security: []
      parameters:
        - name: "X-Telegram-Bot-Api-Secret-Token"
          in: "header"
          required: false
          schema:
            type: "string"
          description: "Telegram webhook secret token configured for the backend."
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelegramWebhookUpdate"
      responses:
        "200":
          description: "Webhook update processed or safely ignored."
        "401":
          description: "Invalid or missing Telegram webhook secret token."
        "500":
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT token for authenticated requests"

  schemas:
    SupportChatStatusDto:
      type: "object"
      properties:
        enabled:
          type: "boolean"
        eligible:
          type: "boolean"
        reason:
          type: "string"
          nullable: true
          enum:
            - "EMAIL_VERIFICATION_REQUIRED"
            - "ACCESS_RESTRICTED"
      required:
        - enabled
        - eligible

    SupportChatConversationDto:
      type: "object"
      properties:
        id:
          type: "string"
          format: "uuid"
        createdAt:
          type: "string"
          format: "date-time"
        updatedAt:
          type: "string"
          format: "date-time"
        lastMessageAt:
          type: "string"
          format: "date-time"
          nullable: true
      required:
        - id
        - createdAt
        - updatedAt

    SupportChatWebSocketTicketDto:
      type: "object"
      properties:
        token:
          type: "string"
      required:
        - token

    CreateSupportChatMessageRequest:
      type: "object"
      properties:
        clientMessageId:
          type: "string"
          format: "uuid"
        body:
          type: "string"
          minLength: 1
          maxLength: 4000
        turnstileToken:
          type: "string"
          nullable: true
          maxLength: 4096
      required:
        - clientMessageId
        - body

    SupportChatMessageDto:
      type: "object"
      properties:
        id:
          type: "string"
          format: "uuid"
        conversationId:
          type: "string"
          format: "uuid"
        clientMessageId:
          type: "string"
          format: "uuid"
          nullable: true
        senderType:
          type: "string"
          enum:
            - "CUSTOMER"
            - "OWNER"
            - "SYSTEM"
        body:
          type: "string"
        deliveryStatus:
          type: "string"
          enum:
            - "PENDING"
            - "SENT"
            - "FAILED"
        createdAt:
          type: "string"
          format: "date-time"
      required:
        - id
        - conversationId
        - senderType
        - body
        - deliveryStatus
        - createdAt

    SupportChatMessagePageDto:
      type: "object"
      properties:
        messages:
          type: "array"
          items:
            $ref: "#/components/schemas/SupportChatMessageDto"
        page:
          type: "integer"
        size:
          type: "integer"
        totalElements:
          type: "integer"
          format: "int64"
        totalPages:
          type: "integer"
      required:
        - messages
        - page
        - size
        - totalElements
        - totalPages

    ErrorResponse:
      $ref: "common-schemas.yaml#/components/schemas/ErrorResponse"

    TelegramWebhookUpdate:
      type: "object"
      properties:
        update_id:
          type: "integer"
          format: "int64"
        message:
          $ref: "#/components/schemas/TelegramWebhookMessage"

    TelegramWebhookMessage:
      type: "object"
      properties:
        message_id:
          type: "integer"
          format: "int64"
        message_thread_id:
          type: "integer"
          format: "int64"
          nullable: true
        chat:
          $ref: "#/components/schemas/TelegramWebhookChat"
        from:
          $ref: "#/components/schemas/TelegramWebhookUser"
        text:
          type: "string"
          nullable: true
        reply_to_message:
          $ref: "#/components/schemas/TelegramWebhookMessage"
        forward_origin:
          type: "object"
          nullable: true
          additionalProperties: true
        forward_from:
          $ref: "#/components/schemas/TelegramWebhookUser"
        forward_sender_name:
          type: "string"
          nullable: true
        forward_date:
          type: "integer"
          format: "int64"
          nullable: true

    TelegramWebhookChat:
      type: "object"
      properties:
        id:
          type: "integer"
          format: "int64"

    TelegramWebhookUser:
      type: "object"
      properties:
        id:
          type: "integer"
          format: "int64"
        is_bot:
          type: "boolean"
          nullable: true
