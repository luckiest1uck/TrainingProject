# =============================================================================
#                    TRAINING PROJECT — E2E PROFILE OVERRIDES
# =============================================================================
# Activated by: SPRING_PROFILES_ACTIVE=<base-profile>,e2e
# Purpose: Keep the selected base profile's resources while disabling request
#          throttling as a test concern for browser automation.
# =============================================================================


security:
  rate-limit:
    global:
      max-requests: 100000
      window-duration: PT1M
    auth:
      max-requests: 100000
      window-duration: PT1M
    search:
      max-requests: 100000
      window-duration: PT1M
    telemetry:
      max-requests: 100000
      window-duration: PT1M
    pre-auth:
      max-requests: 100000
      window-duration: PT1M
    payment:
      max-requests: 100000
      window-duration: PT1M
    write:
      max-requests: 100000
      window-duration: PT1M
    file-upload:
      max-requests: 100000
      window-duration: PT1M
    ban-threshold: 100000
